version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: rule-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-1234}"
      MYSQL_DATABASE: "rule_engine_db"
      TZ: "Asia/Shanghai"
    ports:
      - "3307:3306"
    command:
      [
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci"
      ]
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rule-backend:
    build: .
    container_name: rule-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RULE_SERVER_PORT: "8080"
      RULE_DATASOURCE_URL: "jdbc:mysql://db:3306/rule_engine_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai"
      RULE_DATASOURCE_USERNAME: "root"
      RULE_DATASOURCE_PASSWORD: "${MYSQL_ROOT_PASSWORD:-1234}"
      RULE_REDIS_HOST: "redis"
      RULE_REDIS_PORT: "6379"
      RULE_REDIS_PASSWORD: ""
      RULE_REDIS_DATABASE: "0"
      TZ: "Asia/Shanghai"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/v3/api-docs"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rule-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:

