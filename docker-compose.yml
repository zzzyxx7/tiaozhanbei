services:
  db:
    image: mysql:8.0
    container_name: rule-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-1234}"
      MYSQL_DATABASE: "rule_engine_db"
      TZ: "Asia/Shanghai"
    ports:
      - "3307:3306"
    command:
      [
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci"
      ]
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rule-backend:
    build: .
    container_name: rule-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      # 必须激活 docker 配置，否则会加载 application-dev.yml 里的 127.0.0.1，容器内连不上 MySQL/Redis
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-1234}"
      RULE_SERVER_PORT: "8080"
      TZ: "Asia/Shanghai"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/v3/api-docs >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rule-redis
    restart: unless-stopped
    # 不映射到宿主机 6379，避免与本机已有 Redis 冲突；后端仅通过 Docker 网络访问 redis:6379
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:

