services:
  db:
    image: mysql:8.0
    container_name: rule-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-1234}"
      MYSQL_DATABASE: "rule_engine_db"
      TZ: "Asia/Shanghai"
    ports:
      - "3307:3306"
    command:
      [
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci"
      ]
    volumes:
      - db_data:/var/lib/mysql
      # 首次空库时自动执行本目录下 .sql（将完整备份命名为 init.sql 放入此处，见 README）
      - ./sql/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rule-backend:
    build: .
    container_name: rule-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mq:
        condition: service_healthy
    environment:
      # 必须激活 docker 配置，否则会加载 application-dev.yml 里的 127.0.0.1，容器内连不上 MySQL/Redis
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-1234}"
      # 与 application-docker.yml 中 ${RULE_AI_DEEPSEEK_KEY:} 对应；在仓库根目录 .env 中配置
      RULE_AI_DEEPSEEK_KEY: "${RULE_AI_DEEPSEEK_KEY:-}"
      RULE_AI_PREFILL_DEBOUNCE_MS: "${RULE_AI_PREFILL_DEBOUNCE_MS:-8000}"
      RULE_AI_PREFILL_ASYNC_TASK_TTL_SECONDS: "${RULE_AI_PREFILL_ASYNC_TASK_TTL_SECONDS:-3600}"
      MQ_USER: "${MQ_USER:-zkj}"
      MQ_PASSWORD: "${MQ_PASSWORD:-123456}"
      WECHAT_MINIAPP_APP_ID: "${WECHAT_MINIAPP_APP_ID:-}"
      WECHAT_MINIAPP_SECRET: "${WECHAT_MINIAPP_SECRET:-}"
      RULE_AUTH_JWT_SECRET: "${RULE_AUTH_JWT_SECRET:-}"
      RULE_SERVER_PORT: "8080"
      TZ: "Asia/Shanghai"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/v3/api-docs >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rule-redis
    restart: unless-stopped
    # 映射到宿主机 6380：本地 IDEA 跑后端时用 127.0.0.1:6380；避免与本机已占用 6379 的 Redis 冲突。
    # 仅 Docker 内 rule-backend 仍用主机名 redis:6379，不受影响。
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  mq:
    image: rabbitmq:3-management-alpine
    container_name: rule-mq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "${MQ_USER:-zkj}"
      RABBITMQ_DEFAULT_PASS: "${MQ_PASSWORD:-123456}"
      TZ: "Asia/Shanghai"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - mq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  redis_data:
  mq_data:

