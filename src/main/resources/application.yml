spring:
  application:
    name: rule-backend
  # IDEA / 本地：自动加载项目根目录 .env（与 Docker Compose 同源），使 RULE_AI_DEEPSEEK_KEY 等生效；文件不存在则忽略。
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${rule.datasource.url}
    username: ${rule.datasource.username}
    password: ${rule.datasource.password}

  data:
    redis:
      host: ${rule.redis.host:127.0.0.1}
      port: ${rule.redis.port:6379}
      password: ${rule.redis.password:}
      database: ${rule.redis.database:0}
      timeout: ${rule.redis.timeout:2000ms}
  rabbitmq:
    host: ${rule.mq.host:127.0.0.1}
    port: ${rule.mq.port:5673}
    username: ${rule.mq.user:${MQ_USER:zkj}}
    password: ${rule.mq.password:${MQ_PASSWORD:123456}}

server:
  port: ${rule.server.port:8080}
  tomcat:
    use-apr: NEVER
  servlet:
    multipart:
      max-file-size: ${rule.auth.avatar.max-file-size:8MB}
      max-request-size: ${rule.auth.avatar.max-request-size:8MB}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

ai:
  prefill:
    default-provider: ${rule.ai.prefill.default-provider:deepseek}
    timeout-ms: ${rule.ai.prefill.timeout-ms:12000}
    debounce-ms: ${rule.ai.prefill.debounce-ms:8000}
    async:
      task-ttl-seconds: ${rule.ai.prefill.async.task-ttl-seconds:3600}
  deepseek:
    base-url: ${rule.ai.deepseek.base-url:https://api.deepseek.com}
    model: ${rule.ai.deepseek.model:deepseek-chat}
    api-key: ${rule.ai.deepseek.api-key:}
  openai:
    base-url: ${rule.ai.openai.base-url:https://api.openai.com}
    model: ${rule.ai.openai.model:gpt-4o-mini}
    api-key: ${rule.ai.openai.api-key:}
