server.port=8080

# 本地开发环境：直连你本机 MySQL（rule_engine_db，root/1234）
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/rule_engine_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 防止打印过多 SQL
spring.jpa.open-in-view=false

# Java 24/25 下 Tomcat 的 APR 探测会触发：
# WARNING: A restricted method in java.lang.System has been called...
# 禁用 APR 探测可消掉该 warning（不影响当前业务）。
server.tomcat.use-apr=NEVER

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
